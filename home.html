<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta charset="UTF-8">
<title>Morya Auto Garage</title>

<!-- CSS -->
<link rel="stylesheet" href="home.css">

<!-- Icons -->
<link rel="stylesheet"
	href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

    <!-- ===== HEADER ===== -->
    
    <div class="header-top">
        <div class="logo">
            <img src="Moryalogo.jpeg">
        </div>

        <div class="title">
            <h1>MORYA AUTO SERVICE POINT</h1>
            <p>Expert Two-Wheeler Maintenance & Repairs</p>
            <marquee behavior="" direction="left" style="color:red"> It will fetch data from the database in real-time simulation.</marquee>
        </div>
	

        <nav class="nav">
            <a href="index.html"><i class="fa fa-home"></i> Home</a>
            <a href="index2.html"><i class="fa fa-file-invoice"></i> Generate Bill</a>
            <a href="fetch.html"><i class="fa fa-search"></i> Fetch Details</a>
        </nav>

    </header>

    <hr>

    <!-- ✅ MAIN CONTENT WRAPPED -->
    <div class="container">

        <!-- ===== SUMMARY CARDS ===== -->
        <div class="cards">

            <div class="card">
                <div class="icon blue">
                    <i class="fa fa-wrench"></i>
                </div>
                <h2 id="todayCount">0</h2>
                <p>Today Bills</p>
            </div>

            <div class="card">
                <div class="icon green">
                    <i class="fa fa-rupee-sign"></i>
                </div>
                <h2 id="todayAmount">₹0</h2>
                <p>Today Amount</p>
            </div>

            <div class="card">
                <div class="icon orange">
                    <i class="fa fa-file"></i>
                </div>
                <h2 id="totalBills">0</h2>
                <p>Total Bills</p>
            </div>

            <div class="card">
                <div class="icon purple">
                    <i class="fa fa-user"></i>
                </div>
                <h2 id="lastCustomer">-</h2>
                <p>Last Customer</p>
            </div>

        </div>

        <!-- ===== BUTTONS ===== -->
        <div class="buttons">
            <button onclick="location.href='index2.html'">
                <i class="fa fa-file-invoice"></i> Bill Print & Save
            </button>

            <button onclick="location.href='fetch.html'">
                <i class="fa fa-search"></i> Fetch Records
            </button>
        </div>

        <!-- ===== NOTICE SECTION ===== -->
        <div class="notice-container">

            <div class="notice-display">
                <h3><i class="fa fa-bullhorn"></i> Notice Board</h3>
                <ul id="noticeList"></ul>
            </div>

            <div class="notice-input">
                <h3>Notice Board</h3>
                <textarea id="noticeText" placeholder="Write notice..."></textarea>

                <div class="btn-group">
                    <button class="save" onclick="saveNotice()">Save</button>
                    <button class="clear" onclick="clearNotice()">Clear</button>
                </div>
            </div>

        </div>

    </div> <!-- ✅ END CONTAINER -->

    <script src="home.js"></script>

</body>

</html>
