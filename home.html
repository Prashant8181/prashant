<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Morya Auto Garage</title>

<!-- CSS -->
<link rel="stylesheet" href="home.css">

<!-- Icons -->
<link rel="stylesheet"
	href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

	<!-- ===== HEADER ===== -->
	<header class="header">

		<div class="logo">
			<img src="Moryalogo.jpeg">
		</div>

		<div class="title">
			<h1>MORYA AUTO SERVICE POINT</h1>
			<p>Expert Two-Wheeler Maintenance & Repairs</p>
			<!-- <marquee behavior="" direction="left">It will fetch data from database in real simulation.</marquee> -->
		</div>
<br><br>
		<!-- 🔥 Navigation -->
		<nav class="nav">
			<a href="home.html"> <i class="fa fa-home"></i>Home
			</a> <a href="index.html"> <i class="fa fa-file-invoice"></i>Generate
				Bill
			</a> <a href="fetch.html"> <i class="fa fa-search"></i>Fetch
				Details
			</a>
		</nav>

	</header>

	<hr>

	<!-- ===== SUMMARY CARDS ===== -->
	<div class="cards">

		<div class="card">
			<div class="icon blue">
				<i class="fa fa-wrench"></i>
			</div>
			<h2 id="todayCount">0</h2>
			<p>Today Bills</p>
		</div>

		<div class="card">
			<div class="icon green">
				<i class="fa fa-rupee-sign"></i>
			</div>
			<h2 id="todayAmount">₹0</h2>
			<p>Today Amount</p>
		</div>

		<div class="card">
			<div class="icon orange">
				<i class="fa fa-file"></i>
			</div>
			<h2 id="totalBills">0</h2>
			<p>Total Bills</p>
		</div>

		<div class="card">
			<div class="icon purple">
				<i class="fa fa-user"></i>
			</div>
			<h2 id="lastCustomer">-</h2>
			<p>Last Customer</p>
		</div>

	</div>

	<!-- ===== BUTTONS ===== -->
	<div class="buttons">
		<button onclick="location.href='index.html'">
			<i class="fa fa-file-invoice"></i> Bill Print & Save
		</button>

		<button onclick="location.href='Fetchdetails/fetch.html'">
			<i class="fa fa-search"></i> Fetch Records
		</button>
	</div>

	<!-- ===== NOTICE SECTION ===== -->
	<div class="notice-container">

		<!-- LEFT DISPLAY -->
		<div class="notice-display">
			<h3>
				<i class="fa fa-bullhorn"></i> Notice Board
			</h3>
			<ul id="noticeList"></ul>
		</div>

		<!-- RIGHT INPUT -->
		<div class="notice-input">
			<h3>Notice Board</h3>
			<textarea id="noticeText" placeholder="Write notice..."></textarea>

			<div class="btn-group">
				<button class="save" onclick="saveNotice()">Save</button>
				<button class="clear" onclick="clearNotice()">Clear</button>
			</div>
		</div>

	</div>

	<script src="home.js"></script>

</body>
</html>
