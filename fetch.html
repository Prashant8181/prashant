<!DOCTYPE html>
<html>
<head>
<title>Fetch Records</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link
	href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
	rel="stylesheet">
<link rel="stylesheet" href="fetch.css">
</head>

<body>


	<!-- ===== HEADER ===== -->
	<header class="header">

		<div class="logo">
			<img src="../Moryalogo.jpeg">
		</div>

		<div class="title">
			<h1>MORYA AUTO SERVICE POINT</h1>
			<p>Expert Two-Wheeler Maintenance & Repairs</p>
		</div>

		<!-- 🔥 Navigation -->
		<nav class="nav">
			<a href="../home.html"> <i class="fa fa-home"></i>Home
			</a> <a href="../index2.html"> <i class="fa fa-file-invoice"></i>Generate
				Bill
			</a> <a href="fetch.html"> <i class="fa fa-search"></i>Fetch Details
			</a>
		</nav>

	</header>

	<hr>


	<div class="container">

		<!-- SEARCH CARD -->
		<div class="card">
			<div class="card-header">
				<h2>Search Records</h2>

				<div class="header-actions">
					<button class="total-btn" onclick="getTotal()">
						<i class="fa-solid fa-indian-rupee-sign"></i> Total Business
					</button>

					<button class="reset-btn" onclick="resetForm()">
						<i class="fa-solid fa-rotate-right"></i> Reset
					</button>
				</div>
			</div>

			<div class="search-grid">

				<!-- MOBILE -->
				<div class="field">
					<label>Mobile</label>
					<div class="input-box">
						<input type="text" id="mobile" onkeyup="suggestMobile()"
							placeholder="Enter mobile number"> <i
							class="fa-solid fa-magnifying-glass"></i>
					</div>
					<div id="suggestions" class="suggestions-box"></div>
				</div>

				<!-- VEHICLE -->
				<div class="field">
					<label>Vehicle</label>
					<div class="input-box">
						<input type="text" id="vehicle" onkeyup="suggestVehicle()"
							placeholder="Enter vehicle number"> <i
							class="fa-solid fa-magnifying-glass"></i>
					</div>
					<div id="vehicleSuggestions" class="suggestions-box"></div>
				</div>

				<!-- DATE -->
				<div class="field">
					<label>Date</label>
					<div class="input-box">
						<input type="date" id="date">
					</div>
				</div>

				<!-- UPCOMING -->
				<div class="field">
					<label>Upcoming Service(Select Date)</label>
					<div class="date-range">
						<div class="input-box">
							<input type="date" id="upStart">
						</div>

						<span>To</span>

						<div class="input-box">
							<input type="date" id="upEnd">
						</div>
					</div>
				</div>

				<!-- SEARCH BUTTON (LEFT SIDE) -->
				<!-- <div class="search-btn-box">
					<button class="search-btn" onclick="search()">
						<i class="fa fa-search"></i> Search
					</button>
				</div> -->

				<!-- TOTAL BUSINESS (RIGHT SIDE) -->
				<div class="field total-section">
					<label>Total Business</label>
					<div class="date-range">
						<input type="date" id="totalStart"> <span>To</span> <input
							type="date" id="totalEnd">
					</div>
				</div>

				<!-- SEARCH BUTTON -->
				<div class="search-btn-box">
					<button class="search-btn" onclick="search()">
						<i class="fa fa-search"></i> Search
					</button>
				</div>
			</div>
		</div>

		<!-- RESULT -->
		<div class="card">

			<div class="table-header">
				<h2>Search Results</h2>

				<div class="table-actions">
					<button class="extract-btn1" onclick="printSearchResults()">
						<i class="fa fa-download"></i> Extract
					</button>

					<input type="text" id="searchInput" placeholder="Search here..."
						onkeyup="filterData()">
				</div>
			</div>

			<table>
				<thead>
					<tr>
						<th>ID</th>
						<th>Date</th>
						<th>Mobile</th>
						<th>Brand</th>
						<th>Vehicle</th>
						<th>Model</th>
						<th>Name</th>
						<th>Next Service</th>
						<th>Actions</th>
					</tr>
				</thead>

				<tbody id="result"></tbody>
			</table>

			<!-- PAGINATION -->
			<div class="pagination">
				<span id="pageInfo">Showing 1 to 5 of 5 entries</span>

				<div class="page-btns">
					<button onclick="prevPage()">
						<i class="fa-solid fa-chevron-left"></i>
					</button>

					<button id="pageNumber" class="active">1</button>

					<button onclick="nextPage()">
						<i class="fa-solid fa-chevron-right"></i>
					</button>
				</div>
			</div>

		</div>

	</div>

	<!-- IMPORTANT: JS at end -->
	<script src="fetch.js"></script>
</body>
</html>
