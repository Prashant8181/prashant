<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Coming Soon</title>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,400&family=Inter:wght@300&display=swap" rel="stylesheet">

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        text-align: center;
        font-family: 'Inter', sans-serif;
        
        /* Warm Gradient Background */
        background: linear-gradient(135deg, #2C1F1A, #5A3E2B, #FF8C42);
        color: #F5E6D3;
    }

    .container {
        max-width: 800px;
        padding: 20px;
    }

    .top-text {
        font-size: 12px;
        letter-spacing: 3px;
        color: #c9b6a4;
        margin-bottom: 60px;
    }

    .quote {
        font-family: 'Playfair Display', serif;
        font-size: 32px;
        font-style: italic;
        line-height: 1.6;
        margin-bottom: 50px;
    }

    .line {
        font-size: 16px;
        color: #d6bfa9;
        margin-bottom: 30px;
    }

    .coming {
        font-size: 14px;
        color: #a68a75;
        letter-spacing: 2px;
    }

    /* Responsive */
    @media (max-width: 600px) {
        .quote {
            font-size: 22px;
        }
    }
</style>

</head>
<body>

<div class="container">

    <div class="top-text">a personal space</div>

    <div class="quote">
        "The world is a book, and those who do not travel read only one page."
    </div>

    <div class="line">
        code, work, and the places in between.
    </div>

    <div class="coming">
        coming soon.
    </div>

</div>

</body>
</html>
